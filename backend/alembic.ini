[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Alembic MUST connect directly to PostgreSQL — NOT through PgBouncer.
# PgBouncer in transaction pooling mode is incompatible with the advisory
# locks and DDL statements issued by Alembic migrations.
#
# In Phase 3 (Database Layer), alembic/env.py will override this value by
# reading DATABASE_DIRECT_URL from the environment at migration time.
# Do not point this at pgbouncer:5432.
sqlalchemy.url = postgresql+asyncpg://copilot:copilot@postgres:5432/copilot

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
