services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  celery-indexing:
    build:
      context: ../backend
    command: celery -A app.infrastructure.tasks.celery_app worker -Q indexing_queue -l info
    env_file:
      - ../backend/.env.example
    depends_on:
      - redis
      - postgres

  celery-analysis:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.tasks.celery_app worker -Q analysis_queue -l info
    env_file:
      - ../backend/.env.example
    depends_on:
      - redis
      - postgres

  celery-agent:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.tasks.celery_app worker -Q agent_queue -l info
    env_file:
      - ../backend/.env.example
    depends_on:
      - redis
      - postgres
      - qdrant

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.tasks.celery_app beat -l info
    env_file:
      - ../backend/.env.example
    depends_on:
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
