services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    # PgBouncer in transaction pooling mode.
    # The application (FastAPI + Celery workers) connects to pgbouncer:5432.
    # Alembic migrations connect directly to postgres:5432 via DATABASE_DIRECT_URL.
    #
    # Transaction mode requires asyncpg prepared_statement_cache_size=0
    # (already configured in infrastructure/db/session.py).
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: "postgres://copilot:copilot@postgres:5432/copilot"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      AUTH_TYPE: plain
      SERVER_RESET_QUERY: ""   # Must be empty in transaction mode
    ports:
      - "6432:5432"            # External 6432 for local debugging; app uses internal DNS
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    # One-shot container: creates the copilot-dev bucket on first run.
    # Exits with code 0 after setup; Docker Compose does not restart it.
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/copilot-dev --ignore-existing &&
        echo 'MinIO bucket copilot-dev is ready' &&
        exit 0
      "
    restart: "no"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully

  celery-indexing:
    build:
      context: ../backend
    command: celery -A app.infrastructure.tasks.celery_app worker -Q indexing_queue -l info
    env_file:
      - ../backend/.env.example
    depends_on:
      - redis
      - pgbouncer

  celery-analysis:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.tasks.celery_app worker -Q analysis_queue -l info
    env_file:
      - ../backend/.env.example
    depends_on:
      - redis
      - pgbouncer

  celery-agent:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.tasks.celery_app worker -Q agent_queue -l info
    env_file:
      - ../backend/.env.example
    depends_on:
      - redis
      - pgbouncer
      - qdrant

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.tasks.celery_app beat -l info
    env_file:
      - ../backend/.env.example
    depends_on:
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
